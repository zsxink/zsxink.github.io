  <meta charset="UTF-8">

  <title>手写签名动画</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    .signature-container {
      text-align: center;
    }

    .animated-signature {
      width: 400px;
      height: auto;
    }

    .animated-signature svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .animated-signature path {
      stroke-dasharray: 2400;
      stroke-dashoffset: 2400;
      fill: transparent;
      animation: drawSignature 8s linear infinite both;
      stroke-width: 2px;
      stroke: #1a1a1a;
    }

    @keyframes drawSignature {
      0% {
        stroke-dashoffset: 2400;
      }

      15% {
        fill: transparent;
      }

      35%,
      75% {
        stroke-dashoffset: 0;
        fill: #1a1a1a;
      }

      90%,
      to {
        stroke-dashoffset: 2400;
        fill: transparent;
      }
    }
  </style>
</head>
