<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手写签名动画</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    .signature-container {
      text-align: center;
    }

    .animated-signature {
      width: 400px;
      height: auto;
    }

    .animated-signature svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

.animated-signature path {
      /* 这里的数值可以保持 25000，或者改为路径实际长度 */
      stroke-dasharray: 25000;
      stroke-dashoffset: 25000;
      fill: transparent;
      /* 1. 将 linear 改为 ease-in-out，让动作更自然 */
      animation: drawSignature 10s ease-in-out infinite both;
      stroke-width: 2px;
      stroke: #1a1a1a;
    }

    @keyframes drawSignature {
      0% {
        stroke-dashoffset: 25000;
        fill: transparent;
      }

      /* 2. 增加书写时间占比：从 0% 到 70% 都在画线 */
      45% {
        stroke-dashoffset: 0;
        fill: transparent;
      }

      /* 3. 在 75% 到 90% 之间完成填充颜色并保持 */
      60%, 75% {
        stroke-dashoffset: 0;
        fill: #1a1a1a;
      }

      /* 4. 最后快速消失，准备下一次循环 */
      100% {
        stroke-dashoffset: 25000;
        fill: transparent;
      }
    }
  </style>
</head>
